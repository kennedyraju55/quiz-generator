<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a4a"/>
      <stop offset="100%" style="stop-color:#162040"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#606080"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="bold">SYSTEM ARCHITECTURE</text>

  <!-- User Input Box -->
  <rect x="30" y="55" width="130" height="55" rx="10" fill="url(#cardBg)" stroke="#e94560" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="78" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">👤 User Input</text>
  <text x="95" y="97" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">Topic · Type · Difficulty</text>

  <!-- Arrow: User → Interface Layer -->
  <line x1="160" y1="82" x2="195" y2="82" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Interface Layer Box -->
  <rect x="200" y="48" width="150" height="70" rx="10" fill="url(#cardBg)" stroke="#533483" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="70" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">Interface Layer</text>
  <text x="275" y="88" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="10">CLI (Click)</text>
  <text x="275" y="104" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="10">Web UI (Streamlit)</text>

  <!-- Arrow: Interface → Core -->
  <line x1="350" y1="82" x2="395" y2="82" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Core Engine Box -->
  <rect x="400" y="42" width="170" height="80" rx="10" fill="url(#cardBg)" stroke="#e94560" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="66" text-anchor="middle" fill="#e94560" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🧠 QuizGen Core</text>
  <text x="485" y="84" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">generate_quiz()</text>
  <text x="485" y="97" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">score_quiz()</text>
  <text x="485" y="110" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="9">validate_quiz_data()</text>

  <!-- Arrow: Core → LLM -->
  <line x1="570" y1="82" x2="615" y2="82" stroke="#e94560" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LLM Box -->
  <rect x="620" y="48" width="150" height="70" rx="10" fill="url(#cardBg)" stroke="#e94560" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="695" y="70" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🤖 Ollama / Gemma 3</text>
  <text x="695" y="88" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="10">Local LLM Inference</text>
  <text x="695" y="104" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="10">REST API :11434</text>

  <!-- Lower Modules Section Label -->
  <text x="400" y="158" text-anchor="middle" fill="#606080" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">── Data &amp; Feature Modules ──</text>

  <!-- Arrows from Core down to modules -->
  <line x1="440" y1="122" x2="140" y2="180" stroke="#606080" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <line x1="465" y1="122" x2="340" y2="180" stroke="#606080" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <line x1="505" y1="122" x2="540" y2="180" stroke="#606080" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <line x1="530" y1="122" x2="715" y2="180" stroke="#606080" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>

  <!-- QuestionBank Module -->
  <rect x="50" y="185" width="160" height="65" rx="10" fill="url(#cardBg)" stroke="#533483" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="207" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📦 QuestionBank</text>
  <text x="130" y="223" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">add · remove · filter</text>
  <text x="130" y="238" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">JSON Storage</text>

  <!-- TimedQuiz Module -->
  <rect x="250" y="185" width="160" height="65" rx="10" fill="url(#cardBg)" stroke="#533483" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="207" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">⏱️ TimedQuiz</text>
  <text x="330" y="223" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">start · stop · elapsed</text>
  <text x="330" y="238" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">Per-Question Timer</text>

  <!-- ScoreTracker Module -->
  <rect x="450" y="185" width="160" height="65" rx="10" fill="url(#cardBg)" stroke="#533483" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="530" y="207" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📊 ScoreTracker</text>
  <text x="530" y="223" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">record · history · average</text>
  <text x="530" y="238" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">Performance Analytics</text>

  <!-- Export Module -->
  <rect x="640" y="185" width="140" height="65" rx="10" fill="url(#cardBg)" stroke="#533483" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="710" y="207" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">📤 Export</text>
  <text x="710" y="223" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">JSON · Markdown · PDF</text>
  <text x="710" y="238" text-anchor="middle" fill="#808098" font-family="Segoe UI,Arial,sans-serif" font-size="9">export_quiz_json()</text>

  <!-- Config Section -->
  <text x="400" y="285" text-anchor="middle" fill="#606080" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">── Configuration &amp; Storage ──</text>

  <!-- Config Box -->
  <rect x="120" y="300" width="230" height="55" rx="10" fill="url(#cardBg)" stroke="#3a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <text x="235" y="322" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">⚙️ ConfigManager</text>
  <text x="235" y="340" text-anchor="middle" fill="#606080" font-family="Segoe UI,Arial,sans-serif" font-size="9">config.yaml · .env · Defaults</text>

  <!-- Data Store Box -->
  <rect x="420" y="300" width="260" height="55" rx="10" fill="url(#cardBg)" stroke="#3a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <text x="550" y="322" text-anchor="middle" fill="#a0a0b0" font-family="Segoe UI,Arial,sans-serif" font-size="11" font-weight="bold">💾 Data Persistence</text>
  <text x="550" y="340" text-anchor="middle" fill="#606080" font-family="Segoe UI,Arial,sans-serif" font-size="9">question_bank.json · score_history.json · quiz exports</text>

  <!-- Connector lines from modules to storage -->
  <line x1="130" y1="250" x2="200" y2="300" stroke="#3a3a5c" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="330" y1="250" x2="270" y2="300" stroke="#3a3a5c" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="530" y1="250" x2="510" y2="300" stroke="#3a3a5c" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="710" y1="250" x2="590" y2="300" stroke="#3a3a5c" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="388" width="800" height="12" fill="url(#accent)" rx="0 0 12 12"/>
</svg>
